<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if title %}{{ title }} · {{ site.name }}{% else %}{{ site.name }} — {{ site.role }}{% endif %}</title>
<meta name="description" content="{{ description or site.description }}">
<meta name="author" content="{{ site.author }}">

<link rel="alternate" type="application/atom+xml" title="{{ site.name }}" href="/feed.xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap">

{% if math %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
{% endif %}

<link rel="stylesheet" href="/css/global.css">

{# Warm up the giscus connection early so comments load quicker. #}
{% if site.giscus.repoId and site.giscus.categoryId %}
<link rel="preconnect" href="https://giscus.app">
{% endif %}

{# Privacy-friendly analytics — only in production builds, never local dev. #}
{% if env == "build" and site.goatcounter %}
<script data-goatcounter="https://{{ site.goatcounter }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{% endif %}
