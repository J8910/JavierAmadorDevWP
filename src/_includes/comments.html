{# giscus comments (GitHub Discussions). Fill repoId + categoryId in
   src/_data/site.json (get them from https://giscus.app) to switch this on. #}
{% if site.giscus.repoId and site.giscus.categoryId %}
<section class="comments" aria-label="Comments">
    <script src="https://giscus.app/client.js"
            data-repo="{{ site.giscus.repo }}"
            data-repo-id="{{ site.giscus.repoId }}"
            data-category="{{ site.giscus.category }}"
            data-category-id="{{ site.giscus.categoryId }}"
            data-mapping="pathname"
            data-strict="1"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="light"
            data-lang="en"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
</section>
{% endif %}
